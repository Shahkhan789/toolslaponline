<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online image cropping tool. Crop images to custom dimensions and aspect ratios. No registration required.">
    <meta name="keywords" content="image crop, crop images online, image editing, resize images, aspect ratio">
    <title>Image Crop Tool - ToolSlap</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1E1E2F 0%, #2B2D42 100%);
            color: #EAEAEA;
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #2B2D42 0%, #3A3D5B 100%);
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 20px rgba(255, 215, 0, 0.1);
        }

        .logo {
            color: #FFD700;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .tool-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .tool-title {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tool-description {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        .upload-area {
            border: 3px dashed #FFD700;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: rgba(255, 215, 0, 0.05);
            margin-bottom: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #FFA500;
        }

        .upload-area.dragover {
            background: rgba(255, 215, 0, 0.15);
            border-color: #FFA500;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4rem;
            color: #FFD700;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .file-input {
            display: none;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #1E1E2F;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .crop-container {
            display: none;
            background: rgba(58, 61, 91, 0.3);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .crop-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .aspect-ratios {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .aspect-btn {
            padding: 8px 16px;
            background: rgba(255, 215, 0, 0.1);
            color: #FFD700;
            border: 1px solid #FFD700;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .aspect-btn:hover,
        .aspect-btn.active {
            background: #FFD700;
            color: #1E1E2F;
        }

        .canvas-container {
            text-align: center;
            margin: 30px 0;
        }

        .crop-canvas {
            max-width: 100%;
            border: 2px solid #FFD700;
            border-radius: 10px;
            cursor: crosshair;
        }

        .crop-preview {
            display: none;
            text-align: center;
            margin-top: 30px;
        }

        .preview-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #FFD700;
        }

        .preview-canvas {
            border: 2px solid #FFD700;
            border-radius: 10px;
            max-width: 300px;
        }

        .download-section {
            display: none;
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
        }

        .custom-dimensions {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .dimension-input {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #FFD700;
            border-radius: 5px;
            color: #EAEAEA;
            width: 80px;
            text-align: center;
        }

        .error-message {
            display: none;
            background: rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        @media (max-width: 768px) {
            .tool-title {
                font-size: 2rem;
            }

            .upload-area {
                padding: 30px 20px;
            }

            .crop-controls {
                flex-direction: column;
                align-items: center;
            }

            .aspect-ratios {
                justify-content: center;
            }

            .custom-dimensions {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">ToolSlap</a>
    </header>

    <div class="container">
        <div class="tool-header">
            <h1 class="tool-title">✂️ Image Crop Tool</h1>
            <p class="tool-description">
                Crop your images to perfect dimensions with our easy-to-use online tool. 
                Choose from preset aspect ratios or set custom dimensions.
            </p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">
                <strong>Click to upload an image</strong> or drag and drop
            </div>
            <p>Supports JPG, PNG, GIF, WEBP (Max 10MB)</p>
            <input type="file" class="file-input" id="fileInput" accept="image/*">
        </div>

        <div class="crop-container" id="cropContainer">
            <div class="crop-controls">
                <div class="aspect-ratios">
                    <button class="aspect-btn active" data-ratio="free">Free Crop</button>
                    <button class="aspect-btn" data-ratio="1:1">Square (1:1)</button>
                    <button class="aspect-btn" data-ratio="4:3">4:3</button>
                    <button class="aspect-btn" data-ratio="16:9">16:9</button>
                    <button class="aspect-btn" data-ratio="3:2">3:2</button>
                    <button class="aspect-btn" data-ratio="2:3">2:3 (Portrait)</button>
                    <button class="aspect-btn" data-ratio="9:16">9:16 (Story)</button>
                </div>
                
                <div class="custom-dimensions">
                    <label>Width:</label>
                    <input type="number" class="dimension-input" id="customWidth" placeholder="Auto">
                    <label>×</label>
                    <label>Height:</label>
                    <input type="number" class="dimension-input" id="customHeight" placeholder="Auto">
                    <button class="btn" id="applyCustom">Apply</button>
                </div>
            </div>

            <div class="canvas-container">
                <canvas class="crop-canvas" id="cropCanvas"></canvas>
            </div>

            <div class="crop-preview" id="cropPreview">
                <h3 class="preview-title">Crop Preview</h3>
                <canvas class="preview-canvas" id="previewCanvas"></canvas>
            </div>

            <div class="download-section" id="downloadSection">
                <button class="btn" id="downloadBtn">📥 Download Cropped Image</button>
                <button class="btn" id="resetBtn" style="margin-left: 15px; background: linear-gradient(45deg, #6c757d, #5a6268);">🔄 Reset</button>
            </div>
        </div>
    </div>

    <script>
        let originalImage = null;
        let cropper = null;
        let currentAspectRatio = null;

        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const cropContainer = document.getElementById('cropContainer');
        const cropCanvas = document.getElementById('cropCanvas');
        const previewCanvas = document.getElementById('previewCanvas');
        const cropPreview = document.getElementById('cropPreview');
        const downloadSection = document.getElementById('downloadSection');
        const errorMessage = document.getElementById('errorMessage');

        // Upload area events
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', handleDragOver);
        uploadArea.addEventListener('drop', handleDrop);
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));

        fileInput.addEventListener('change', handleFileSelect);

        function handleDragOver(e) {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }

        function handleFileSelect(e) {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('Please select a valid image file.');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                showError('File size must be less than 10MB.');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                loadImage(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function loadImage(src) {
            const img = new Image();
            img.onload = function() {
                originalImage = img;
                setupCropper();
                cropContainer.style.display = 'block';
            };
            img.src = src;
        }

        function setupCropper() {
            const canvas = cropCanvas;
            const ctx = canvas.getContext('2d');
            
            // Calculate canvas size maintaining aspect ratio
            const maxWidth = Math.min(800, window.innerWidth - 40);
            const maxHeight = 600;
            
            let canvasWidth, canvasHeight;
            const imgAspect = originalImage.width / originalImage.height;
            
            if (imgAspect > maxWidth / maxHeight) {
                canvasWidth = maxWidth;
                canvasHeight = maxWidth / imgAspect;
            } else {
                canvasHeight = maxHeight;
                canvasWidth = maxHeight * imgAspect;
            }
            
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            
            ctx.drawImage(originalImage, 0, 0, canvasWidth, canvasHeight);
            
            // Initialize crop area
            cropper = {
                x: canvasWidth * 0.1,
                y: canvasHeight * 0.1,
                width: canvasWidth * 0.8,
                height: canvasHeight * 0.8,
                dragging: false,
                resizing: false
            };
            
            drawCropArea();
            setupCanvasEvents();
        }

        function drawCropArea() {
            const canvas = cropCanvas;
            const ctx = canvas.getContext('2d');
            
            // Clear and redraw image
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
            
            // Draw overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Clear crop area
            ctx.clearRect(cropper.x, cropper.y, cropper.width, cropper.height);
            
            // Redraw image in crop area
            const scaleX = originalImage.width / canvas.width;
            const scaleY = originalImage.height / canvas.height;
            
            ctx.drawImage(
                originalImage,
                cropper.x * scaleX,
                cropper.y * scaleY,
                cropper.width * scaleX,
                cropper.height * scaleY,
                cropper.x,
                cropper.y,
                cropper.width,
                cropper.height
            );
            
            // Draw crop border
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 2;
            ctx.strokeRect(cropper.x, cropper.y, cropper.width, cropper.height);
            
            // Draw corner handles
            const handleSize = 8;
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(cropper.x - handleSize/2, cropper.y - handleSize/2, handleSize, handleSize);
            ctx.fillRect(cropper.x + cropper.width - handleSize/2, cropper.y - handleSize/2, handleSize, handleSize);
            ctx.fillRect(cropper.x - handleSize/2, cropper.y + cropper.height - handleSize/2, handleSize, handleSize);
            ctx.fillRect(cropper.x + cropper.width - handleSize/2, cropper.y + cropper.height - handleSize/2, handleSize, handleSize);
            
            updatePreview();
        }

        function setupCanvasEvents() {
            const canvas = cropCanvas;
            
            canvas.addEventListener('mousedown', startCrop);
            canvas.addEventListener('mousemove', updateCrop);
            canvas.addEventListener('mouseup', endCrop);
        }

        function startCrop(e) {
            const rect = cropCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Check if clicking inside crop area
            if (x >= cropper.x && x <= cropper.x + cropper.width &&
                y >= cropper.y && y <= cropper.y + cropper.height) {
                cropper.dragging = true;
                cropper.startX = x - cropper.x;
                cropper.startY = y - cropper.y;
            }
        }

        function updateCrop(e) {
            if (!cropper.dragging) return;
            
            const rect = cropCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            cropper.x = Math.max(0, Math.min(x - cropper.startX, cropCanvas.width - cropper.width));
            cropper.y = Math.max(0, Math.min(y - cropper.startY, cropCanvas.height - cropper.height));
            
            drawCropArea();
        }

        function endCrop() {
            cropper.dragging = false;
            cropper.resizing = false;
        }

        function updatePreview() {
            const canvas = previewCanvas;
            const ctx = canvas.getContext('2d');
            
            canvas.width = Math.min(300, cropper.width);
            canvas.height = (canvas.width / cropper.width) * cropper.height;
            
            const scaleX = originalImage.width / cropCanvas.width;
            const scaleY = originalImage.height / cropCanvas.height;
            
            ctx.drawImage(
                originalImage,
                cropper.x * scaleX,
                cropper.y * scaleY,
                cropper.width * scaleX,
                cropper.height * scaleY,
                0, 0,
                canvas.width,
                canvas.height
            );
            
            cropPreview.style.display = 'block';
            downloadSection.style.display = 'block';
        }

        // Aspect ratio buttons
        document.querySelectorAll('.aspect-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.aspect-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const ratio = this.dataset.ratio;
                applyAspectRatio(ratio);
            });
        });

        function applyAspectRatio(ratio) {
            if (!cropper) return;
            
            currentAspectRatio = ratio;
            
            if (ratio === 'free') {
                // Keep current crop area
                drawCropArea();
                return;
            }
            
            const [w, h] = ratio.split(':').map(Number);
            const aspectRatio = w / h;
            
            // Adjust crop area to match aspect ratio
            const maxWidth = cropCanvas.width * 0.8;
            const maxHeight = cropCanvas.height * 0.8;
            
            let newWidth, newHeight;
            
            if (aspectRatio > maxWidth / maxHeight) {
                newWidth = maxWidth;
                newHeight = newWidth / aspectRatio;
            } else {
                newHeight = maxHeight;
                newWidth = newHeight * aspectRatio;
            }
            
            cropper.width = newWidth;
            cropper.height = newHeight;
            cropper.x = (cropCanvas.width - newWidth) / 2;
            cropper.y = (cropCanvas.height - newHeight) / 2;
            
            drawCropArea();
        }

        // Download functionality
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const scaleX = originalImage.width / cropCanvas.width;
            const scaleY = originalImage.height / cropCanvas.height;
            
            canvas.width = cropper.width * scaleX;
            canvas.height = cropper.height * scaleY;
            
            ctx.drawImage(
                originalImage,
                cropper.x * scaleX,
                cropper.y * scaleY,
                canvas.width,
                canvas.height,
                0, 0,
                canvas.width,
                canvas.height
            );
            
            // Download
            const link = document.createElement('a');
            link.download = 'cropped-image.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        // Reset functionality
        document.getElementById('resetBtn').addEventListener('click', function() {
            cropContainer.style.display = 'none';
            cropPreview.style.display = 'none';
            downloadSection.style.display = 'none';
            fileInput.value = '';
            originalImage = null;
            cropper = null;
        });

        // Custom dimensions
        document.getElementById('applyCustom').addEventListener('click', function() {
            const width = parseInt(document.getElementById('customWidth').value);
            const height = parseInt(document.getElementById('customHeight').value);
            
            if (width && height && cropper) {
                const scaleX = cropCanvas.width / originalImage.width;
                const scaleY = cropCanvas.height / originalImage.height;
                
                cropper.width = Math.min(width * scaleX, cropCanvas.width);
                cropper.height = Math.min(height * scaleY, cropCanvas.height);
                cropper.x = Math.max(0, (cropCanvas.width - cropper.width) / 2);
                cropper.y = Math.max(0, (cropCanvas.height - cropper.height) / 2);
                
                drawCropArea();
                
                // Update active aspect ratio
                document.querySelectorAll('.aspect-btn').forEach(b => b.classList.remove('active'));
                currentAspectRatio = 'custom';
            }
        });
    </script>
</body>
</html>
