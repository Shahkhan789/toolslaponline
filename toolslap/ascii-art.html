                'H': [' ‚Ėą   ‚Ėą ', ' ‚Ėą   ‚Ėą ', ' ‚Ėą   ‚Ėą ', ' ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą ', ' ‚Ėą   ‚Ėą ', ' ‚Ėą   ‚Ėą ', '       '],
                'I': [' ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą ', '   ‚Ėą   ', '   ‚Ėą   ', '   ‚Ėą   ', '   ‚Ėą   ', ' ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą ', '       '],
                'J': [' ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą ', '     ‚Ėą ', '     ‚Ėą ', '     ‚Ėą ', ' ‚Ėą   ‚Ėą ', '  ‚Ėą‚Ėą‚Ėą  ', '       '],

                'W': [' ‚Ėą   ‚Ėą ', ' ‚Ėą   ‚Ėą ', ' ‚Ėą   ‚Ėą ', ' ‚Ėą ‚Ėą ‚Ėą ', ' ‚Ėą‚Ėą ‚Ėą‚Ėą ', ' ‚Ėą   ‚Ėą ', '       '],

                'Y': [' ‚Ėą   ‚Ėą ', '  ‚Ėą ‚Ėą  ', '   ‚Ėą   ', '   ‚Ėą   ', '   ‚Ėą   ', '   ‚Ėą   ', '       '],
                'Z': [' ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą ', '    ‚Ėą  ', '   ‚Ėą   ', '  ‚Ėą    ', ' ‚Ėą     ', ' ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą ', '       '],
                ' ': ['       ', '       ', '       ', '       ', '       ', '       ', '       ']
            }}
        };
        
        function generateAscii() {
            const text = document.getElementById('textInput').value.toUpperCase();
            const fontName = document.getElementById('fontSelect').value;
            const font = fonts[fontName] || fonts.basic;
            
            if (!text.trim()) {
                document.getElementById('asciiOutput').textContent = 'Please enter some text to convert.';
                return;
            }
            
            const lines = [];
            for (let i = 0; i < font.height; i++) {
                lines[i] = '';
            }
            
            for (let char of text) {
                const charPattern = font.chars[char] || font.chars[' '];
                for (let i = 0; i < font.height; i++) {
                    lines[i] += charPattern[i] || ' '.repeat(charPattern[0]?.length || 5);
                }
            }
            
            document.getElementById('asciiOutput').textContent = lines.join('\n');
        }
        
        async function copyAscii() {
            const output = document.getElementById('asciiOutput').textContent;
            if (!output || output.includes('Click')) return alert('Generate ASCII art first!');
            
            await navigator.clipboard.writeText(output);
            const btn = event.target;
            const orig = btn.textContent;
            btn.textContent = '‚úÖ Copied!';
            setTimeout(() => btn.textContent = orig, 2000);
        }
        
        function downloadAscii() {
            const output = document.getElementById('asciiOutput').textContent;
            if (!output || output.includes('Click')) return alert('Generate ASCII art first!');
            
            const blob = new Blob([output], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ascii-art.txt';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        document.getElementById('textInput').addEventListener('input', generateAscii);
        document.getElementById('fontSelect').addEventListener('change', generateAscii);
        document.addEventListener('DOMContentLoaded', generateAscii);
    </script>
