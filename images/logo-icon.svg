<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="32" height="32" rx="6" fill="url(#iconGradient)"/>
  
  <!-- Tool Icon -->
  <g transform="translate(6, 8)">
    <rect x="0" y="6" width="12" height="2" rx="1" fill="url(#iconAccent)"/>
    <rect x="2" y="3" width="8" height="2" rx="1" fill="url(#iconAccent)"/>
    <circle cx="6" cy="12" r="1.5" fill="url(#iconAccent)"/>
    <rect x="8" y="10" width="6" height="3" rx="1.5" fill="white"/>
    <rect x="10" y="4" width="3" height="8" rx="1.5" fill="white"/>
  </g>
</svg>
