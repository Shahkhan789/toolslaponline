<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="toolslapGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tool Icon -->
  <g transform="translate(8, 8)">
    <rect x="0" y="12" width="16" height="3" rx="1.5" fill="url(#accentGradient)"/>
    <rect x="4" y="6" width="8" height="3" rx="1.5" fill="url(#accentGradient)"/>
    <circle cx="8" cy="20" r="2" fill="url(#accentGradient)"/>
    <rect x="12" y="18" width="8" height="4" rx="2" fill="url(#toolslapGradient)"/>
    <rect x="14" y="8" width="4" height="12" rx="2" fill="url(#toolslapGradient)"/>
  </g>
  
  <!-- ToolSlap Text -->
  <text x="38" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="url(#toolslapGradient)">
    Tool<tspan fill="url(#accentGradient)">Slap</tspan>
  </text>
  
  <!-- Slogan -->
  <text x="38" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#6B7280">
    Free Online Tools
  </text>
</svg>
