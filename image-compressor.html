<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor - ToolSlap</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.2.1/compressor.min.js" crossorigin="anonymous"></script>
    <style>
        /* --- Theme Variables (from Multi Tool Hub) --- */
        :root {
            --bg-dark-navy: #1E1E2F;
            --text-light-gray: #EAEAEA;
            --header-deep-blue: #2B2D42;
            --accent-gold: #FFD700;
            --accent-gold-hover: #E6C200;
            --card-grayish-blue: #3A3D5B;
            --gold-shadow: rgba(255, 215, 0, 0.2);
            --error-red: #E57373;
        }

        /* --- General Styling --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark-navy);
            color: var(--text-light-gray);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        /* --- Main Tool Container --- */
        .compressor-container {
            background-color: var(--header-deep-blue);
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 8px 30px var(--gold-shadow);
            border: 1px solid var(--card-grayish-blue);
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--accent-gold);
            font-size: 2.5rem;
        }

        /* --- Upload Area --- */
        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
            width: 100%;
            border: 3px dashed var(--card-grayish-blue);
            border-radius: 8px;
            padding: 3rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s, background-color 0.3s;
        }

        .upload-area:hover {
            border-color: var(--accent-gold);
            background-color: rgba(255, 215, 0, 0.05);
        }

        .upload-area p {
            font-size: 1.2rem;
            margin-top: 1rem;
        }

        #file-input {
            display: none;
        }
        
        /* --- Controls Area --- */
        .controls {
            margin-top: 2rem;
            background-color: var(--card-grayish-blue);
            padding: 1.5rem;
            border-radius: 8px;
            display: none; /* Hidden by default */
        }

        .quality-slider {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .quality-slider label {
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        #quality-value {
            color: var(--accent-gold);
            font-weight: bold;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: var(--bg-dark-navy);
            border-radius: 5px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent-gold);
            cursor: pointer;
            border-radius: 50%;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: var(--accent-gold);
            cursor: pointer;
            border-radius: 50%;
        }

        /* --- Buttons --- */
        .btn {
            background-color: var(--accent-gold);
            color: var(--bg-dark-navy);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: block;
            width: 100%;
            margin-top: 1.5rem;
            text-decoration: none; /* For download link */
            text-align: center;
        }

        .btn:hover {
            background-color: var(--accent-gold-hover);
        }
        
        .btn:disabled {
            background-color: #777;
            cursor: not-allowed;
        }

        /* --- Results & Preview Area --- */
        .results {
            display: none; /* Hidden by default */
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .preview-box {
            background-color: var(--card-grayish-blue);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .preview-box h3 {
            margin-bottom: 1rem;
        }

        .preview-box img {
            max-width: 100%;
            height: auto;
            max-height: 300px;
            border-radius: 4px;
            object-fit: contain;
            background-color: var(--bg-dark-navy);
        }
        
        .file-info {
            margin-top: 1rem;
            font-weight: bold;
        }

        .file-info .size {
            color: var(--accent-gold);
        }

        /* --- Messages & Indicators --- */
        #message-area {
            text-align: center;
            margin-top: 1rem;
            font-weight: bold;
            min-height: 24px;
        }

        .error {
            color: var(--error-red);
        }
        
        .processing {
            color: var(--accent-gold);
        }

        /* --- Responsive Design --- */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .compressor-container {
                padding: 1rem;
            }
            .results {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="compressor-container">
        <h1>Image Compressor</h1>

        <label for="file-input" class="upload-area" id="upload-label">
            <span style="font-size:2.5rem;">📤</span>
            <p><strong>Click to Upload</strong> or drag & drop</p>
            <p style="font-size: 0.9rem; color: #aaa;">Supports: PNG, JPG, WEBP, BMP, etc.</p>
        </label>
        <input type="file" id="file-input" accept="image/png, image/jpeg, image/bmp, image/gif, image/tiff, image/webp" style="display:none;">
        
        <div class="controls" id="controls-area" style="display:none;">
            <div class="quality-slider">
                <label for="quality-range">Compression Quality: <span id="quality-value">80%</span></label>
                <input type="range" id="quality-range" min="10" max="100" value="80" step="5">
            </div>
            <button class="btn" id="compress-btn">Compress Image</button>
        </div>

        <div id="message-area"></div>

        <div class="results" id="results-area" style="display:none;">
            <div class="preview-box" id="original-preview" style="display:none;">
                <h3>Original Image</h3>
                <img id="original-img" src="" alt="Original Image">
                <p class="file-info">Size: <span id="original-size" class="size"></span></p>
            </div>
            <div class="preview-box" id="compressed-preview" style="display:none;">
                <h3>Compressed Image</h3>
                <img id="compressed-img" src="" alt="Compressed Image">
                <p class="file-info">Size: <span id="compressed-size" class="size"></span></p>
                <a href="#" class="btn" id="download-btn" download="compressed-image.jpg">Download</a>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
    const fileInput = document.getElementById('file-input');
    const uploadLabel = document.getElementById('upload-label');
    const controlsArea = document.getElementById('controls-area');
    const qualityRange = document.getElementById('quality-range');
    const qualityValue = document.getElementById('quality-value');
    const compressBtn = document.getElementById('compress-btn');
    const messageArea = document.getElementById('message-area');
    const resultsArea = document.getElementById('results-area');
    const originalImg = document.getElementById('original-img');
    const originalSize = document.getElementById('original-size');
    const compressedImg = document.getElementById('compressed-img');
    const compressedSize = document.getElementById('compressed-size');
    const downloadBtn = document.getElementById('download-btn');
    const originalPreview = document.getElementById('original-preview');
    const compressedPreview = document.getElementById('compressed-preview');
    let selectedFile = null;

    // Show upload dialog on label click
    uploadLabel.addEventListener('click', () => fileInput.click());

    // Handle file selection
    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            selectedFile = e.target.files[0];
            showOriginalPreview(selectedFile);
            controlsArea.style.display = 'block';
            compressBtn.disabled = false;
            compressedPreview.style.display = 'none';
            messageArea.textContent = '';
        }
    });

    // Compression button
    compressBtn.addEventListener('click', () => {
        if (!selectedFile) {
            messageArea.textContent = 'Please select an image first.';
            return;
        }
        compressBtn.disabled = true;
        messageArea.textContent = 'Compressing...';
        const quality = parseInt(qualityRange.value, 10) / 100;
        new Compressor(selectedFile, {
            quality: quality,
            success(result) {
                const url = URL.createObjectURL(result);
                compressedImg.src = url;
                compressedSize.textContent = formatBytes(result.size);
                downloadBtn.href = url;
                downloadBtn.download = `compressed-${Date.now()}.jpg`;
                compressedPreview.style.display = 'block';
                messageArea.textContent = 'Compression complete!';
                compressBtn.disabled = false;
            },
            error(err) {
                messageArea.textContent = 'Compression failed: ' + err.message;
                compressBtn.disabled = false;
            }
        });
    });

    // Quality slider
    qualityRange.addEventListener('input', () => {
        qualityValue.textContent = `${qualityRange.value}%`;
    });

    function showOriginalPreview(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            originalImg.src = e.target.result;
            originalSize.textContent = formatBytes(file.size);
            resultsArea.style.display = 'grid';
            originalPreview.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024, dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }
});
    </script>
</body>
</html>
